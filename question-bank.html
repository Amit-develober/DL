<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Apply Comic Relief font to all text */
        body {
            font-family: 'Comic Relief', system-ui, -apple-system, sans-serif;
            font-weight: 700;
        }

        h1, h2, h3 {
            font-family: 'Comic Relief', system-ui, -apple-system, sans-serif;
            font-weight: 700;
        }

        input, select, button {
            font-family: 'Comic Relief', system-ui, -apple-system, sans-serif;
            font-weight: 700;
        }

        .book-item a, .book-item p, .disclaimer-banner p, .credit {
            font-weight: 700;
        }

        .large-text {
            font-weight: 700;
        }
        /* Add emoji size control for header */
        header .emoji {
            font-size: 2.0em;
            display: inline-block;
            vertical-align: middle;
        }
        header h1 {
            font-weight: 700;
        }
        .header-controls a {
            font-weight: 600;
        }
        h2 {
            font-weight: 700;
        }
        .font-size-controls {
            display: inline-block;
            margin-left: 10px;
        }
        .font-size-btn {
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .font-size-btn:hover {
            background: #45a049;
        }
        .back-button {
            padding: 8px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            text-decoration: none;
            transition: background 0.3s;
        }
        .back-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body class="dark-mode">
    <header>
         <div class="container">
            <h1 style="-webkit-text-stroke: 2px #000000; color: white; font-weight: 900;"><span class="emoji">📚</span> <strong>Question Bank</strong></h1>
            <div class="header-controls">
                <a href="index.html" class="back-button" style="background-color: #4CAF50; color: white; padding: clamp(8px, 2vw, 15px) clamp(15px, 3vw, 25px); text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: clamp(10px, 3vh, 25px); font-size: var(--small-text);">← Back to Home</a>
                <div class="font-size-controls">
                    <button class="font-size-btn" onclick="changeFontSize('decrease')" style="width: clamp(25px, 5vw, 35px); height: clamp(25px, 5vw, 35px);">-</button>
                    <button class="font-size-btn" onclick="changeFontSize('increase')" style="width: clamp(25px, 5vw, 35px); height: clamp(25px, 5vw, 35px);">+</button>
                </div>
            </div>
        </div>
    </header>
    <div class="disclaimer-banner" style="padding: clamp(10px, 2vw, 20px); font-size: var(--small-text);">
        <p>
            All books and resources available in this library are completely legal and free to access.
        </p>
    </div>
    <main class="container" style="padding: clamp(15px, 3vw, 30px);">
        <div class="book-list" style="gap: clamp(15px, 3vw, 30px);">
            <div class="book-item" style="padding: clamp(15px, 3vw, 25px);">
                <h2 style="color: black; font-size: var(--large-text);">Books</h2>
                <ul style="gap: clamp(10px, 2vw, 20px);">
                    <li style="margin-bottom: clamp(8px, 2vw, 16px);">
                        <a href=" lINK " target="_blank" style="font-size: var(--base-font-size);">
                            <span class="large-text">Comming Soon</span>
                        </a>
                    </li>
                    <li style="margin-bottom: clamp(8px, 2vw, 16px);">
                        <a href=" lINK " target="_blank" style="font-size: var(--base-font-size);">
                            <span class="large-text">Comming Soon</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </main>
    <div class="credit" style="text-align: center; padding: clamp(8px, 2vw, 15px) 0; font-size: clamp(0.9rem, 1.5vw, 1.2rem); color: #2c3e50; margin: clamp(8px, 2vw, 15px) 0;">SCAN S.B.V No. 2 Block Janakpuri , New Delhi-110058</div>
<script>
    function changeFontSize(action) {
      const root = document.documentElement;
      const currentFontSize = parseFloat(getComputedStyle(root).fontSize);
      const screenWidth = window.innerWidth;
      
      // Scale the increment based on screen size
      const increment = screenWidth < 768 ? 0.5 : 1;
      
      if (action === 'increase') {
        // Limit maximum size based on screen width
        const maxSize = screenWidth < 768 ? 24 : 28;
        const newSize = Math.min(currentFontSize + increment, maxSize);
        root.style.fontSize = newSize + 'px';
      } else if (action === 'decrease') {
        // Ensure minimum readable size
        const minSize = screenWidth < 768 ? 12 : 14;
        const newSize = Math.max(currentFontSize - increment, minSize);
        root.style.fontSize = newSize + 'px';
      }
      
      // Adjust other elements proportionally
      document.querySelectorAll('h1, h2, h3, p, a, li, button').forEach(el => {
        el.style.transition = 'all 0.3s ease';
      });
    }
    
    // Initialize responsive sizing on page load
    window.addEventListener('load', function() {
      const screenWidth = window.innerWidth;
      const initialSize = screenWidth < 768 ? 16 : (screenWidth < 1024 ? 18 : 20);
      document.documentElement.style.fontSize = initialSize + 'px';
    });
    
    // Adjust on window resize
    window.addEventListener('resize', function() {
      const screenWidth = window.innerWidth;
      const initialSize = screenWidth < 768 ? 16 : (screenWidth < 1024 ? 18 : 20);
      document.documentElement.style.fontSize = initialSize + 'px';
    });
  </script>
</body>
</html>
